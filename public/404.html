<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vanguard Digital Solutions</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Redirects to index.html and preserves the path and query string.
      //
      // Set pathSegmentsToKeep to 1 for project sites (username.github.io/repo)
      // or 0 for custom domain / user sites (username.github.io).
      const pathSegmentsToKeep = 0;
      const l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.host +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
